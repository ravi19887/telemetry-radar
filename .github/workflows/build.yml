name: Compile My Custom App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # 1. This step grabs YOUR custom code that you uploaded above
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Grant Execute Permissions
      run: chmod +x gradlew

    - name: Compile APK
      run: |
        ./gradlew assembleDebug -Pandroid.injected.applicationId=com.spatial.hud.navigator

    - name: Upload Spatial HUD APK
      uses: actions/upload-artifact@v4
      with:
        name: Spatial-HUD-Navigator
        path: app/build/outputs/apk/debug/app-debug.apk
