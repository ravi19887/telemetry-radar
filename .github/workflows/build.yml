name: Compile My Custom App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    # Instead of relying on a missing gradlew file, we install Gradle directly onto the runner!
    - name: Setup Gradle Build Environment
      uses: gradle/actions/setup-gradle@v4

    - name: Find Project and Compile APK
      run: |
        # Locate where build.gradle or build.gradle.kts lives in your uploaded zip files
        GRADLE_PROJECT_DIR=$(find . -name "build.gradle*" -not -path "*/app/*" | head -n 1)
        if [ -z "$GRADLE_PROJECT_DIR" ]; then
          # Fallback if it only finds the app-level file
          BUILD_DIR="."
        else
          BUILD_DIR=$(dirname "$GRADLE_PROJECT_DIR")
        fi
        
        cd "$BUILD_DIR"
        # Run compilation using the cloud-installed global gradle command
        gradle assembleDebug -Pandroid.injected.applicationId=com.spatial.hud.navigator

    - name: Upload Spatial HUD APK
      uses: actions/upload-artifact@v4
      with:
        name: Spatial-HUD-Navigator
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*-debug.apk
