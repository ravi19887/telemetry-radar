name: Compile My Custom App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    # 1. This step creates the dummy environment files and the google-services template
    - name: Create Missing Environment Dotfiles & Firebase Placeholders
      run: |
        touch .env.example
        touch .env
        echo "API_KEY=mock_key_for_compilation" > .env.example
        echo "API_KEY=mock_key_for_compilation" > .env
        
        # Creating a basic dummy google-services.json so the plugin passes cleanly
        mkdir -p app/
        echo '{"project_info":{"project_number":"123456789","project_id":"mock-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.spatial.hud.navigator"}},"api_key":[{"current_key":"mock_key"}],"services":{}}],"configuration_version":"1"}' > app/google-services.json

    # 2. This step automatically generates the missing debug signature keystore
    - name: Generate Missing Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"

    - name: Setup Gradle Build Environment
      uses: gradle/actions/setup-gradle@v4

    - name: Find Project and Compile APK
      run: |
        GRADLE_PROJECT_DIR=$(find . -name "build.gradle*" -not -path "*/app/*" | head -n 1)
        if [ -z "$GRADLE_PROJECT_DIR" ]; then
          BUILD_DIR="."
        else
          BUILD_DIR=$(dirname "$GRADLE_PROJECT_DIR")
        fi
        
        cd "$BUILD_DIR"
        gradle assembleDebug -Pandroid.injected.applicationId=com.spatial.hud.navigator

    - name: Upload Spatial HUD APK
      uses: actions/upload-artifact@v4
      with:
        name: Spatial-HUD-Navigator
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*-debug.apk
